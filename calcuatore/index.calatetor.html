<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caltulator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="doc.js">
</head>

<body>
    <div class="wrapper">
        <section class="screen">
            0
        </section>
        <section class="cal-buttons">
            <div class="cal-button-row">
                <button class="cal-button double">
                 c
                </button> 
                <button class="cal-button">
                    &larr;
                </button>
                <button class="cal-button">
                    &divide;
                </button>
            </div>

            <div class="cal-button-row">
                <button class="cal-button">
                    7
                </button>
                      <button class="cal-button">
                    8
                </button>
                      <button class="cal-button">
                    9
                </button>
                      <button class="cal-button">
                    &times;
                      </button>
            </div>
            <div class="cal-button-row">
                      <button class="cal-button">
                    6
                </button>
                      <button class="cal-button">
                    5
                </button>
                      <button class="cal-button">
                    4
                </button>
                      <button class="cal-button">
                    &minus;
                </button>
            </div>
            <div class="cal-button-row">
                <button class="cal-button">
                    3
                </button>
                <button class="cal-button">
                    2
                </button>
                <button class="cal-button">
                    1
                </button>
                <button class="cal-button">
                    &plus;
                </button>
            </div>
                <dev class="cal-button-row">
                <button class="cal-button triple">
                    0
                </button>
                <button class="cal-button triple">
                    &equals;
                </button>
                </dev>

        </section>
    </div>
    <script src="doc.js"></script>
</body>
</html>
